<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>スロット</title>
<style>
  :root{
    --bg:#0f1320; --card:#1a2031; --card2:#222a40; --line:#2c3650;
    --fg:#e7ecf5; --mut:#8b97b5; --accent:#5b8cff; --good:#27c08a;
    --warn:#e2a93b; --bad:#e2615a; --honmei:#ffce54;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",sans-serif;
    font-size:15px; line-height:1.5}
  .wrap{max-width:760px; margin:0 auto; padding:10px 12px 78px}
  h2{font-size:16px; margin:16px 0 8px; display:flex; align-items:center; gap:6px}
  h2 .sub{font-size:11px; color:var(--mut); font-weight:400}
  .meta{font-size:11px; color:var(--mut); margin:2px 0 10px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px}
  button{font:inherit; cursor:pointer}

  /* 的中率帯 */
  .perfbar{display:flex; gap:14px; align-items:baseline; flex-wrap:wrap;
    background:var(--card2); border:1px solid var(--line); border-radius:10px;
    padding:7px 12px; margin-bottom:10px; font-size:12px; color:var(--mut)}
  .perfbar b{font-size:16px; color:var(--fg)}
  .perfbar .note{margin-left:auto; font-size:10px}

  /* タイプ切替セグメント */
  .seg{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
  .seg button{background:var(--card2); color:var(--mut); border:1px solid var(--line);
    border-radius:9px; padding:6px 12px; font-size:13px}
  .seg button.on{background:var(--accent); color:#fff; border-color:var(--accent)}

  /* ボトムメニュー */
  .tabs{position:fixed; left:0; right:0; bottom:0; display:flex;
    background:#0c101b; border-top:1px solid var(--line); z-index:20}
  .tabs button{flex:1; background:none; border:0; color:var(--mut);
    padding:9px 2px 10px; font-size:11px;
    display:flex; flex-direction:column; align-items:center; gap:2px; line-height:1.2}
  .tabs button .ic{font-size:17px}
  .tabs button.on{color:var(--accent); font-weight:600}

  /* 今日の狙い: 2列カードグリッド */
  .picks-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px}
  .pick-card{background:var(--card2); border:1px solid var(--line); border-radius:10px;
    padding:8px; min-width:0}
  .pick-top{display:flex; align-items:baseline; gap:4px; margin-bottom:3px}
  .pick-no{font-size:20px; font-weight:800; color:var(--honmei); flex-shrink:0}
  .pick-loc{font-size:11px; color:var(--mut); flex:1}
  .pick-pct{font-size:12px; font-weight:700; color:var(--good); flex-shrink:0}
  .pick-name{font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    margin-bottom:2px}
  .pick-reason{font-size:10px; color:var(--mut); overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap}

  /* 週間予報: 横スクロールカード */
  .fc-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px}
  .fc{display:flex; gap:7px; width:max-content}
  .fc .d{width:90px; flex-shrink:0; background:var(--card2); border:1px solid var(--line);
    border-radius:9px; padding:6px 4px; text-align:center; cursor:pointer}
  .fc .d.sel{border-color:var(--accent); background:#26314e}
  .fc .dow{font-size:10px; color:var(--mut)}
  .fc .dd{font-size:13px; font-weight:600}
  .fc .g{font-size:20px; font-weight:800; margin:2px 0}
  .gA{color:var(--good)} .gB{color:#6cd0a8} .gC{color:var(--warn)}
  .gD{color:#c9926a} .gE{color:var(--bad)} .gx{color:var(--mut)}
  .fc .cc{font-size:11px; color:var(--mut)}

  /* 共通テーブル */
  .pos{color:var(--good)} .neg{color:var(--bad)} .mut{color:var(--mut)}
  .hon{color:var(--honmei); font-weight:700}
  input,select{font:inherit; background:var(--card2); color:var(--fg);
    border:1px solid var(--line); border-radius:8px; padding:6px 8px}
  .ctl{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:8px}
  .ctl label{font-size:11px; color:var(--mut)}
  .empty{color:var(--mut); text-align:center; padding:24px 0}
  .err{color:var(--bad); font-size:12px}

  /* 横スクロールラッパ */
  .scroll-x{overflow-x:auto; overflow-y:auto; max-height:64vh;
    -webkit-overflow-scrolling:touch; background:var(--card);
    border:1px solid var(--line); border-radius:12px; margin-bottom:10px}

  /* 差枚・看板テーブル */
  .sg-tbl{border-collapse:collapse; font-size:13px; min-width:100%}
  .sg-tbl th,.sg-tbl td{padding:5px 8px; border-bottom:1px solid var(--line);
    text-align:right; white-space:nowrap}
  .sg-tbl th{color:var(--mut); font-weight:600; font-size:11px;
    position:sticky; top:0; background:var(--card); z-index:2; cursor:pointer}
  .sg-tbl td.l,.sg-tbl th.l{text-align:left}

  /* 2段行(名前行) */
  .sg-nr td{background:#1e2d4a; font-size:12px; font-weight:600;
    color:#a8c4ff; padding:6px 8px 2px; border-bottom:none;
    max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  /* 2段行(データ行) */
  .sg-dr td{font-size:13px; padding:2px 8px 8px}
  .sg-dr td.l{font-size:11px; color:var(--mut)}

  /* 週間予報・看板のmname */
  .mname{max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block}
  /* 看板テーブル */
  .bntbl td.l,.bntbl th.l{max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
</style>
</head>
<body>
<div class="wrap"><div id="page"></div></div>
<div class="tabs">
  <button id="t-pick"    onclick="go('pick')"><span class="ic">🎯</span>今日の狙い</button>
  <button id="t-week"    onclick="go('week')"><span class="ic">📅</span>週間予報</button>
  <button id="t-banner"  onclick="go('banner')"><span class="ic">🏆</span>看板</button>
  <button id="t-sagumai" onclick="go('sagumai')"><span class="ic">📊</span>差枚</button>
</div>

<script>
let DATA=null, SCREEN='pick', TYPE='at', SELDAY=0;
const TYPES={at:'AT機', a:'Aタイプ', okidoki:'沖ドキ系'};
const TYPE_KEY={at:'AT', a:'A', okidoki:'沖ドキ系'};

const pct=v=> v==null?'–':(v*100).toFixed(1)+'%';
const sgn=v=> v==null?'':(v>0?'+':'')+Math.round(v).toLocaleString();
const cls=v=> v==null?'':(v>0?'pos':(v<0?'neg':''));
const esc=s=> (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function go(s){ SCREEN=s; render(); window.scrollTo(0,0); }
function setType(t){ TYPE=t; SELDAY=0; render(); }

function perfBar(){
  const sec=(DATA.dashboard||{})[TYPE]||{};
  const perf=sec.performance||{}, bt=perf.backtest||{};
  const basis=perf.basis||bt.basis;
  if(sec.error||bt.top5_has_hit==null) return `<div class="perfbar">的中率データなし</div>`;
  return `<div class="perfbar">
    <span>Top5 <b>${pct(bt.top5_has_hit)}</b></span>
    <span>Top10 <b>${pct(bt.top10_has_hit)}</b></span>
    <span>検証${bt.days??'–'}日</span>
    <span class="note">${basis==='ml'?'ML walk-forward':'参考値(good_score)'}</span></div>`;
}
function typeSeg(){
  return `<div class="seg">`+Object.keys(TYPES).map(k=>
    `<button class="${k===TYPE?'on':''}" onclick="setType('${k}')">${TYPES[k]}</button>`).join('')+`</div>`;
}
function head(){ return `<div class="meta">更新: ${esc(DATA.generated_at)}　/　${esc(DATA.store_id)}</div>`; }

/* ---------- 今日の狙い ---------- */
function scrPick(){
  const p=DATA.patterns;
  let h=head();
  const _t=TYPE; TYPE='at'; h+=perfBar(); TYPE=_t;
  if(!p||p.error||!p.picks)
    return h+`<div class="card err">今日の狙いデータなし${p&&p.error?': '+esc(p.error):''}</div>`;
  const pk=p.picks;
  h+=`<h2>今日の狙い <span class="sub">${esc(pk.as_of)}（${esc(pk.weekday)}）${pk.event_like?'・イベント該当':''}</span></h2>`;
  if(pk.banners&&pk.banners.length)
    h+=`<div class="meta">看板: `+pk.banners.map(b=>`${esc(b.model)}（${(b.score*100).toFixed(0)}%）`).join(' / ')+`</div>`;
  if(!pk.picks||!pk.picks.length)
    return h+`<div class="card empty">本日の役割ルール該当なし</div>`;
  h+=`<div class="picks-grid">`;
  for(const x of pk.picks){
    const island=esc((x.island||'').replace('island_',''));
    const reason=esc((x.reasons||[]).join('・'));
    h+=`<div class="pick-card">
      <div class="pick-top">
        <span class="pick-no">${x.machine_no}</span>
        <span class="pick-loc">${island}/${x.end}</span>
        <span class="pick-pct">${pct(x.expected_hit)}</span>
      </div>
      <div class="pick-name">${esc(x.model)}</div>
      <div class="pick-reason">${reason}</div>
    </div>`;
  }
  h+=`</div>`;
  return h;
}

/* ---------- 週間予報 ---------- */
function scrWeek(){
  let h=head()+typeSeg()+perfBar();
  const sec=(DATA.dashboard||{})[TYPE]||{};
  if(sec.error) return h+`<div class="card err">読み込みエラー: ${esc(sec.error)}</div>`;
  const fc=sec.forecast||{}, days=fc.days||[], basis=(sec.performance||{}).basis||fc.basis;
  h+=`<h2>週間予報 <span class="sub">← スライド / タップで台一覧</span></h2>`;
  h+=`<div class="card"><div class="fc-wrap"><div class="fc">`;
  h+=days.map((x,i)=>{
    const g=x.grade||'-'; const gc=g==='-'?'gx':'g'+g;
    return `<div class="d ${i===SELDAY?'sel':''}" onclick="selDay(${i})">
      <div class="dow">${esc(x.weekday||'')}</div>
      <div class="dd">${esc((x.date||'').slice(5))}</div>
      <div class="g ${gc}">${esc(g)}</div>
      <div class="cc">${x.candidate_count??0}台</div></div>`;
  }).join('')+`</div></div>`;
  const day=days[SELDAY];
  if(day){
    const ep=day.expected_payout!=null?` / 出玉率 ${(day.expected_payout*100).toFixed(1)}%`:'';
    h+=`<div class="meta" style="margin-top:8px">${esc(day.date)}（${esc(day.weekday)}） 候補${day.candidate_count??0}台${ep}</div>`;
    const ms=day.machines||[];
    if(ms.length){
      h+=`<div class="scroll-x" style="max-height:none; border:none; border-radius:0; background:transparent; margin:0">
        <table class="sg-tbl"><thead><tr>
          <th style="text-align:right">#</th>
          <th class="l">機種</th>
          <th>台</th>
          <th>${basis==='ml'?'ML確率':'スコア'}</th>
        </tr></thead><tbody>`;
      h+=ms.map(m=>`<tr>
          <td>${m.rank}</td>
          <td class="l"><span class="mname">${esc(m.machine_name)}</span></td>
          <td>${m.machine_no}</td>
          <td>${basis==='ml'?pct(m.ml_prob):(m.good_score!=null?m.good_score.toFixed(1):'–')}</td></tr>`).join('');
      h+=`</tbody></table></div>`;
    }
  }
  return h+`</div>`;
}
function selDay(i){ SELDAY=i; render(); }

/* ---------- 看板ランキング ---------- */
function scrBanner(){
  let h=head()+typeSeg()+perfBar();
  const p=DATA.patterns;
  h+=`<h2>看板ランキング <span class="sub">直近45日 機種内good率</span></h2>`;
  if(!p||p.error||!p.banner) return h+`<div class="card err">看板データなし</div>`;
  const list=p.banner
    .filter(b=>b.machine_type===TYPE_KEY[TYPE])
    .sort((a,b)=>b.good_rate-a.good_rate).slice(0,20);
  h+=`<div class="scroll-x"><table class="sg-tbl bntbl"><thead><tr>
      <th style="text-align:right">#</th>
      <th class="l">機種</th>
      <th>台数</th>
      <th>good率</th></tr></thead><tbody>`;
  h+=list.map((b,i)=>`<tr>
      <td>${i+1}</td>
      <td class="l"><span class="mname">${esc(b.display_name||b.official_name)}</span></td>
      <td>${b.machine_count}</td>
      <td>${pct(b.good_rate)}</td></tr>`).join('');
  if(!list.length) h+=`<tr><td colspan="4" class="empty">対象機種なし</td></tr>`;
  return h+`</tbody></table></div>`;
}

/* ---------- 差枚 ---------- */
let SG={from:'', to:'', type:'', q:'', group:'machine', sort:'diff', desc:true};

function dateRange(from, to){
  const dates=[], end=new Date(to);
  let d=new Date(from);
  while(d<=end){ dates.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return dates;
}

function scrSagumai(){
  const sg=DATA.sagumai;
  if(!sg||!sg.rows||!sg.rows.length) return head()+`<div class="empty">差枚データなし</div>`;
  if(!SG.from){
    SG.to=sg.to;
    const f=new Date(sg.to); f.setDate(f.getDate()-6); SG.from=f.toISOString().slice(0,10);
  }
  let h=head();
  h+=`<div class="meta">同梱期間 ${esc(sg.from)}〜${esc(sg.to)}（${sg.months}ヶ月・${sg.rows.length.toLocaleString()}行）</div>`;
  h+=`<div class="card">
    <div class="ctl"><label>期間</label>
      <input type="date" id="sg-from" min="${sg.from}" max="${sg.to}" value="${SG.from}" onchange="sgSet()">
      <span>〜</span>
      <input type="date" id="sg-to" min="${sg.from}" max="${sg.to}" value="${SG.to}" onchange="sgSet()"></div>
    <div class="seg">`+
      [['7','直近7日'],['30','直近30日'],['90','直近90日'],['all','全期間']].map(([k,l])=>
        `<button onclick="sgPreset('${k}')">${l}</button>`).join('')+`</div>
    <div class="ctl"><label>タイプ</label>
      <select id="sg-type" onchange="sgSet()">
        <option value="">全</option><option value="AT">AT</option>
        <option value="A">A</option><option value="沖ドキ系">沖ドキ系</option>
        <option value="?">不明</option></select>
      <label>集計</label>
      <select id="sg-group" onchange="sgSet()">
        <option value="machine">台番別</option><option value="model">機種別</option></select>
      <input type="search" id="sg-q" placeholder="機種名で絞込" value="${esc(SG.q)}"
        oninput="sgSet()" style="flex:1; min-width:100px"></div>
  </div><div id="sg-result"></div>`;
  setTimeout(()=>{
    const t=document.getElementById('sg-type'); if(t) t.value=SG.type;
    const g=document.getElementById('sg-group'); if(g) g.value=SG.group;
    renderSagumai();
  },0);
  return h;
}

function sgSet(){
  SG.from=document.getElementById('sg-from').value;
  SG.to=document.getElementById('sg-to').value;
  SG.type=document.getElementById('sg-type').value;
  SG.group=document.getElementById('sg-group').value;
  SG.q=document.getElementById('sg-q').value.trim();
  renderSagumai();
}
function sgPreset(k){
  const sg=DATA.sagumai; SG.to=sg.to;
  if(k==='all') SG.from=sg.from;
  else{ const f=new Date(sg.to); f.setDate(f.getDate()-(parseInt(k)-1)); SG.from=f.toISOString().slice(0,10); }
  document.getElementById('sg-from').value=SG.from;
  document.getElementById('sg-to').value=SG.to;
  renderSagumai();
}
function sgSort(col){
  if(SG.sort===col) SG.desc=!SG.desc; else{SG.sort=col; SG.desc=true;}
  renderSagumai();
}

function renderSagumai(){
  const sg=DATA.sagumai, ci={};
  sg.columns.forEach((c,i)=>ci[c]=i);
  const q=SG.q.toLowerCase();
  const fromD=new Date(SG.from), toD=new Date(SG.to);
  const daySpan=Math.round((toD-fromD)/86400000)+1;
  if(daySpan<=7) renderSagumaiDaily(sg,ci,q);
  else renderSagumaiAgg(sg,ci,q);
}

function renderSagumaiAgg(sg, ci, q){
  const byModel=SG.group==='model', groups={};
  for(const r of sg.rows){
    const date=r[ci.date];
    if(date<SG.from||date>SG.to) continue;
    if(SG.type&&r[ci.type]!==SG.type) continue;
    const name=r[ci.name]||'';
    if(q&&!name.toLowerCase().includes(q)) continue;
    const key=byModel?name:r[ci.machine_no];
    let g=groups[key];
    if(!g) g=groups[key]={key,name,games:0,diff:0,days:0,good:0,machines:new Set()};
    const games=r[ci.games]||0, diff=r[ci.diff]||0;
    g.games+=games; g.diff+=diff; g.days++; g.machines.add(r[ci.machine_no]);
    const pay=games>0?1+diff/(3*games):0;
    if((games>=2500&&pay>=1.08)||(games>=2000&&pay>=1.04)) g.good++;
  }
  let arr=Object.values(groups).map(g=>({...g,avg:g.days?g.diff/g.days:0,mcount:g.machines.size}));
  arr.sort((a,b)=>{ const v=(b[SG.sort]??0)-(a[SG.sort]??0); return SG.desc?v:-v; });
  const sumDiff=arr.reduce((s,g)=>s+g.diff,0), sumG=arr.reduce((s,g)=>s+g.games,0);
  const arrow=c=>SG.sort===c?(SG.desc?' ▼':' ▲'):'';

  let h=`<div class="meta">${arr.length}${byModel?'機種':'台'}　総差枚 <b class="${cls(sumDiff)}">${sgn(sumDiff)}</b>　総回転 ${sumG.toLocaleString()}</div>`;
  if(!arr.length){ document.getElementById('sg-result').innerHTML=h+`<div class="card empty">該当なし</div>`; return; }

  h+=`<div class="scroll-x"><table class="sg-tbl"><thead>
    <tr>
      <th class="l">${byModel?'台数':'台番'}</th>
      <th onclick="sgSort('games')">総回転${arrow('games')}</th>
      <th onclick="sgSort('diff')">総差枚${arrow('diff')}</th>
      <th onclick="sgSort('avg')">平均/日${arrow('avg')}</th>
      <th onclick="sgSort('good')">良台日${arrow('good')}</th>
    </tr></thead><tbody>`;

  for(const g of arr.slice(0,300)){
    h+=`<tr class="sg-nr"><td colspan="5">${esc(g.name)}</td></tr>`;
    h+=`<tr class="sg-dr">
      <td class="l">${byModel?(g.mcount+'台'):g.key}</td>
      <td>${g.games.toLocaleString()}</td>
      <td class="${cls(g.diff)}">${sgn(g.diff)}</td>
      <td class="${cls(g.avg)}">${sgn(g.avg)}</td>
      <td>${g.good}</td></tr>`;
  }
  h+=`</tbody></table></div>`;
  if(arr.length>300) h+=`<div class="meta">上位300件のみ表示（${arr.length}件中）</div>`;
  document.getElementById('sg-result').innerHTML=h;
}

function renderSagumaiDaily(sg, ci, q){
  const byModel=SG.group==='model';
  const dates=dateRange(SG.from, SG.to);
  const fmtD=d=>d.slice(5).replace('-','/');
  const groups={};
  for(const r of sg.rows){
    const date=r[ci.date];
    if(date<SG.from||date>SG.to) continue;
    if(SG.type&&r[ci.type]!==SG.type) continue;
    const name=r[ci.name]||'';
    if(q&&!name.toLowerCase().includes(q)) continue;
    const key=byModel?name:r[ci.machine_no];
    if(!groups[key]) groups[key]={key, name, no:r[ci.machine_no], type:r[ci.type], days:{}, total:0, machines:new Set()};
    const diff=r[ci.diff]||0;
    groups[key].days[date]=(groups[key].days[date]||0)+diff;
    groups[key].total+=diff;
    groups[key].machines.add(r[ci.machine_no]);
  }
  let arr=Object.values(groups).sort((a,b)=>b.total-a.total);
  const sumDiff=arr.reduce((s,g)=>s+g.total,0);
  const NCols=dates.length+1;

  let h=`<div class="meta">${arr.length}${byModel?'機種':'台'}　合計差枚 <b class="${cls(sumDiff)}">${sgn(sumDiff)}</b>　← スライド</div>`;
  if(!arr.length){ document.getElementById('sg-result').innerHTML=h+`<div class="card empty">該当なし</div>`; return; }

  h+=`<div class="scroll-x"><table class="sg-tbl"><thead>
    <tr>
      <th class="l">${byModel?'台数':'台番'}</th>`;
  for(const d of dates) h+=`<th>${fmtD(d)}</th>`;
  h+=`<th>合計</th></tr></thead><tbody>`;

  for(const g of arr.slice(0,100)){
    h+=`<tr class="sg-nr"><td colspan="${NCols+1}">${esc(g.name)}</td></tr>`;
    h+=`<tr class="sg-dr"><td class="l">${byModel?(g.machines.size+'台'):g.key}</td>`;
    for(const d of dates){
      const v=g.days[d];
      if(v==null) h+=`<td class="mut">–</td>`;
      else if(v===0) h+=`<td class="mut">0</td>`;
      else h+=`<td class="${cls(v)}">${sgn(v)}</td>`;
    }
    h+=`<td class="${cls(g.total)}">${sgn(g.total)}</td></tr>`;
  }
  h+=`</tbody></table></div>`;
  if(arr.length>100) h+=`<div class="meta">上位100件のみ表示（${arr.length}件中）</div>`;
  document.getElementById('sg-result').innerHTML=h;
}

/* ---------- ルーティング ---------- */
function render(){
  for(const s of ['pick','week','banner','sagumai'])
    document.getElementById('t-'+s).className=s===SCREEN?'on':'';
  const el=document.getElementById('page');
  if(SCREEN==='pick')     el.innerHTML=scrPick();
  else if(SCREEN==='week')    el.innerHTML=scrWeek();
  else if(SCREEN==='banner')  el.innerHTML=scrBanner();
  else if(SCREEN==='sagumai') el.innerHTML=scrSagumai();
}

fetch('data.json?v='+Date.now()).then(r=>r.json()).then(d=>{ DATA=d; render(); })
  .catch(e=>{ document.getElementById('page').innerHTML=
    '<div class="card err">data.json を読み込めませんでした: '+esc(e.message)+'</div>'; });
</script>
</body>
</html>
