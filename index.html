<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0f1320">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>スロット予測</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%; background:#0f1320; color:#e7ecf5;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",sans-serif}
  #shell{height:100vh; height:100dvh}
  #f-predict{width:100%; height:100%; border:0; background:#0f1320; display:block}
  #update-banner{position:fixed; left:10px; right:10px;
    bottom:calc(env(safe-area-inset-bottom) + 10px); z-index:50;
    background:#5b8cff; color:#fff; border:0; border-radius:12px;
    padding:12px 14px; font-size:14px; font-weight:700; font-family:inherit;
    box-shadow:0 4px 16px rgba(0,0,0,.35); display:none}
  #update-banner.show{display:block}
</style>
</head>
<body>
<div id="shell">
  <iframe id="f-predict" src="predict/index.html" title="予測データ"></iframe>
</div>
<button id="update-banner">🔄 新しいバージョンがあります。タップで更新</button>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').then(function(reg){
        var banner = document.getElementById('update-banner');
        function promptUpdate(worker){
          banner.classList.add('show');
          banner.onclick = function(){
            banner.classList.remove('show');
            worker.postMessage({type:'SKIP_WAITING'});
          };
        }
        // iOSのホーム画面アプリはバックグラウンドで自動チェックしないため、
        // 起動時・復帰時に明示的に最新版を確認する
        reg.update().catch(function(){});
        document.addEventListener('visibilitychange', function(){
          if(document.visibilityState === 'visible') reg.update().catch(function(){});
        });
        if(reg.waiting) promptUpdate(reg.waiting);
        reg.addEventListener('updatefound', function(){
          var nw = reg.installing;
          if(!nw) return;
          nw.addEventListener('statechange', function(){
            if(nw.state === 'installed' && navigator.serviceWorker.controller) promptUpdate(nw);
          });
        });
        var reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', function(){
          if(reloaded) return; reloaded = true; location.reload();
        });
      }).catch(function(){});
    });
  }
</script>
</body>
</html>
