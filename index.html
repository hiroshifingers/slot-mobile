<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0f1320">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>スロット</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%; background:#0f1320; color:#e7ecf5;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",sans-serif}
  #shell{display:flex; flex-direction:column; height:100vh; height:100dvh}
  #topnav{display:flex; gap:6px; padding:calc(env(safe-area-inset-top) + 8px) 10px 8px;
    background:#0c101b; border-bottom:1px solid #2c3650; flex:0 0 auto}
  #topnav button{flex:1; background:#222a40; color:#8b97b5; border:1px solid #2c3650;
    border-radius:10px; padding:9px 4px; font-size:15px; font-weight:700; font-family:inherit}
  #topnav button.on{background:#5b8cff; color:#fff; border-color:#5b8cff}
  #frames{position:relative; flex:1 1 auto; min-height:0}
  #frames iframe{position:absolute; inset:0; width:100%; height:100%; border:0; background:#0f1320}
  #frames iframe.hidden{display:none}
</style>
</head>
<body>
<div id="shell">
  <nav id="topnav">
    <button id="t-predict" class="on">📊 予測</button>
    <button id="t-practice">🎰 実践</button>
  </nav>
  <div id="frames">
    <iframe id="f-predict" src="predict/index.html" title="予測データ"></iframe>
    <iframe id="f-practice" class="hidden" title="実践カウンター" data-src="practice/index.html"></iframe>
  </div>
</div>
<script>
  var bp = document.getElementById('t-predict');
  var ba = document.getElementById('t-practice');
  var fp = document.getElementById('f-predict');
  var fa = document.getElementById('f-practice');
  function show(which){
    var pred = which === 'predict';
    bp.classList.toggle('on', pred);
    ba.classList.toggle('on', !pred);
    fp.classList.toggle('hidden', !pred);
    fa.classList.toggle('hidden', pred);
    // 実践フレームは初回タップ時に遅延ロード(初期表示を軽く保つ)
    if(!pred && !fa.src){ fa.src = fa.dataset.src; }
    try{ location.hash = which; }catch(e){}
  }
  bp.addEventListener('click', function(){ show('predict'); });
  ba.addEventListener('click', function(){ show('practice'); });
  if(location.hash === '#practice'){ show('practice'); }
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
</script>
</body>
</html>
